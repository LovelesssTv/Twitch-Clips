<!DOCTYPE html>
<html>
  <body style="margin:0; overflow:hidden; background:black">
    <iframe id="twitchPlayer" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>

    <script>
      const STORAGE_KEY = "clip_queue_loveless";
      let queue = [];

      // Fisher-Yates shuffle corretto
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function saveQueue() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(queue)); } catch(e) {}
      }

      function loadQueue(allClips) {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            const valid = parsed.filter(url => allClips.includes(url));
            if (valid.length > 0) return valid;
          }
        } catch(e) {}
        return shuffle(allClips);
      }

      // ponytail: legge la durata reale della clip dal parametro URL; fallback 30s se mancante o assurda
      function getDurationMs(url) {
        try {
          const sec = parseFloat(new URL(url).searchParams.get("duration"));
          return (sec > 0 && sec < 180 ? sec : 30) * 1000 + 3000; // +3s margine buffering
        } catch(e) { return 33000; }
      }

      function playNext() {
        if (!queue.length) return;
        const url = queue.shift();
        saveQueue();

        if (queue.length === 0) {
          queue = shuffle(JSON.parse(localStorage.getItem("all_clips") || "[]"));
          if (queue[0] === url && queue.length > 1) {
            const swapIdx = 1 + Math.floor(Math.random() * (queue.length - 1));
            [queue[0], queue[swapIdx]] = [queue[swapIdx], queue[0]];
          }
          saveQueue();
        }

        const iframe = document.getElementById("twitchPlayer");
        iframe.src = url + "&autoplay=true&muted=false";

        setTimeout(playNext, getDurationMs(url));
      }

      fetch("clips.json?nocache=" + Date.now())
        .then(r => r.json())
        .then(allClips => {
          try { localStorage.setItem("all_clips", JSON.stringify(allClips)); } catch(e) {}

          queue = loadQueue(allClips);
          playNext();
        });
    </script>
  </body>
</html>
